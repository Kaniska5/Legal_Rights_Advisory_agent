<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal Rights Advisory — India</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --text: #e6edf3;
      --text-muted: #8b9cb3;
      --accent: #3b82c6;
      --accent-soft: rgba(59, 130, 198, 0.15);
      --success: #22c55e;
      --warning: #eab308;
      --border: #2d3a4d;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      margin: 0 0 0.5rem;
      color: var(--text);
    }
    .tagline {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.85rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      resize: vertical;
      transition: border-color 0.2s;
    }
    textarea::placeholder {
      color: var(--text-muted);
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 0.75rem;
    }
    .btn:hover:not(:disabled) {
      background: #2563eb;
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .spinner {
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1.5rem;
      display: none;
    }
    .result.visible {
      display: block;
    }
    .result h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.35rem;
      margin: 0 0 1rem;
      color: var(--text);
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    .badge.criminal { background: var(--accent-soft); color: var(--accent); }
    .badge.consumer { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .section-block {
      margin-bottom: 1.25rem;
    }
    .section-block h3 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin: 0 0 0.4rem;
    }
    .section-block p, .section-block ul {
      margin: 0;
      color: var(--text);
    }
    .section-block ul {
      padding-left: 1.25rem;
    }
    .section-block li {
      margin-bottom: 0.35rem;
    }
    .sections-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .sections-list span {
      background: var(--surface2);
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .disclaimer {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-top: 1rem;
      display: none;
    }
    .error-msg.visible {
      display: block;
    }
    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Legal Rights Advisory</h1>
      <p class="tagline">Criminal Law &amp; Consumer Protection — India</p>
    </header>

    <section class="input-section">
      <label for="query">Describe your situation or ask a legal question</label>
      <textarea
        id="query"
        placeholder="e.g. My neighbour threatened me with a knife. What can I do? Or: I paid for a product but the company never delivered..."
        autofocus
      ></textarea>
      <button type="button" class="btn" id="submitBtn">
        Get legal guidance
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </section>

    <section class="result" id="result">
      <h2>Your legal guidance</h2>
      <div class="badge" id="badge"></div>
      <div class="section-block">
        <h3>Relevant sections</h3>
        <div class="sections-list" id="sections"></div>
      </div>
      <div class="section-block">
        <h3>Explanation</h3>
        <p id="explanation"></p>
      </div>
      <div class="section-block">
        <h3>What you can do</h3>
        <ul id="actions"></ul>
      </div>
      <div class="section-block">
        <h3>Possible punishment / remedy</h3>
        <p id="punishment"></p>
      </div>
      <div class="section-block">
        <h3>Where to escalate</h3>
        <p id="escalation"></p>
      </div>
      <p class="disclaimer" id="disclaimer"></p>
    </section>

    <footer>
      For informational purposes only. Not legal advice. Consult a qualified lawyer for your case.
    </footer>
  </div>

  <script>
    const queryEl = document.getElementById('query');
    const submitBtn = document.getElementById('submitBtn');
    const resultEl = document.getElementById('result');
    const errorMsgEl = document.getElementById('errorMsg');

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.innerHTML = loading
        ? '<span class="spinner"></span> Analysing...'
        : 'Get legal guidance';
    }

    function showError(msg) {
      errorMsgEl.textContent = msg;
      errorMsgEl.classList.add('visible');
      resultEl.classList.remove('visible');
    }

    function hideError() {
      errorMsgEl.classList.remove('visible');
    }

    function showResult(data) {
      hideError();
      const d = data.data || data;
      const cat = (d.law_category || '').toLowerCase();
      document.getElementById('badge').textContent = cat === 'consumer_protection' ? 'Consumer protection' : 'Criminal law';
      document.getElementById('badge').className = 'badge ' + (cat === 'consumer_protection' ? 'consumer' : 'criminal');

      const secs = d.relevant_sections || [];
      const secEl = document.getElementById('sections');
      secEl.innerHTML = secs.length ? secs.map(s => '<span>' + escapeHtml(s) + '</span>').join('') : '—';

      document.getElementById('explanation').textContent = d.legal_explanation || '—';
      const actions = d.citizen_actions || [];
      document.getElementById('actions').innerHTML = actions.length ? actions.map(a => '<li>' + escapeHtml(a) + '</li>').join('') : '<li>Consult a lawyer with your specific facts.</li>';
      document.getElementById('punishment').textContent = d.possible_punishment || '—';
      document.getElementById('escalation').textContent = d.escalation_authority || '—';
      document.getElementById('disclaimer').textContent = d.disclaimer || '';

      resultEl.classList.add('visible');
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    submitBtn.addEventListener('click', async () => {
      const query = (queryEl.value || '').trim();
      if (!query) {
        showError('Please enter your question or situation.');
        return;
      }
      setLoading(true);
      hideError();
      try {
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });
        let out;
        try {
          out = await res.json();
        } catch (_) {
          throw new Error(res.statusText || 'Server error');
        }
        if (!res.ok) {
          const detail = out && out.detail;
          const msg = Array.isArray(detail) ? detail.map(d => d.msg || d).join(', ') : (detail || res.statusText);
          throw new Error(msg);
        }
        showResult(out);
      } catch (e) {
        showError(e.message || 'Something went wrong. Ensure the server is running and Ollama is available.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
